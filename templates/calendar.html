<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ board_name | default("DisplayBoard") }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Board 1: main layout — 3-column grid, iPad landscape */
        .board {
            grid-template-columns: 1fr 3fr 0.5fr;
            grid-template-rows: auto 1fr;
            grid-template-areas:
                "datetime       weather-now      pagination"
                "calendar       calendar         calendar";
        }

        .topic-datetime         { grid-area: datetime; }
        .topic-pagination       { grid-area: pagination; }
        .topic-weather-current  { grid-area: weather-now; }
        .topic-calendar         { grid-area: calendar; }
    </style>
</head>
<body>

<div id="background"></div>
<div id="ws-status"></div>

<div class="board">

    <!-- ── Date / Time ───────────────────────────────────────────────── -->
    <div class="topic topic-datetime">
        <div class="time-detail">
            <div class="datetime-time" id="datetime-time">--:--</div>
            <div class="datetime-time-seconds" id="datetime-seconds">--</div>
        </div>
        <div class="datetime-date" id="datetime-date">--- -- ----</div>
    </div>

    <!-- ── Current Weather ───────────────────────────────────────────── -->
    <div class="topic topic-weather-current">
        <div class="topic-label">Current Weather</div>
        <div class="weather-content">
            <div class="weather-icon" id="weather-icon">🌤</div>
            <div class="weather-detail">
                <div class="weather-temp" id="weather-temp">--°</div>
                <div class="weather-desc" id="weather-desc">Loading…</div>
                <div class="weather-wind" id="weather-wind">Wind: --</div>
            </div>
            <div class="weather-extra">
                <div class="weather-extra-row">
                    <img src="/static/sunrise.png" class="weather-extra-icon" alt="Sunrise">
                    <span class="weather-extra-value" id="weather-sunrise">--:--</span>
                </div>
                <div class="weather-extra-row">
                    <img src="/static/sunset.png" class="weather-extra-icon" alt="Sunset">
                    <span class="weather-extra-value" id="weather-sunset">--:--</span>
                </div>
                <div class="weather-extra-row">
                    <div class="weather-extra-icon" id="weather-extra-icon">💧</div>
                    <span class="weather-extra-value" id="weather-precip">--%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Board Pagination ───────────────────────────────────────────── -->
    <div class="topic topic-pagination" data-board-count="{{ board_count | default(2) }}">
        <button class="pagination-btn" onclick="prevBoard()">&#8249;</button>
        <!-- <span class="pagination-name" id="board-name">{{ board_name | default("Board 1") }}</span> -->
        <button class="pagination-btn" onclick="nextBoard()">&#8250;</button>
    </div>

    <!-- ── Calendar ────────────────────────────────────────────────────── -->
    <div class="topic topic-calendar">
        <div class="calendar-container" id="calendar-container">
            Loading...
        </div>
    </div>    

</div>

<script src="/static/board.js"></script>
<script id="board-config" type="application/json">
{{ {"board_name": board_name, "auto_rotate_sec": auto_rotate_sec} | tojson }}
</script>
<script>
const BOARD_CONFIG = JSON.parse(document.getElementById("board-config").textContent);
const BOARD_NAME = BOARD_CONFIG.board_name;
const AUTO_ROTATE_SEC = BOARD_CONFIG.auto_rotate_sec;

// ── Auto-refresh for board rotation ─────────────────────────────────────────
// Only auto-refresh when no explicit board is selected (enables auto-rotation)
if (AUTO_ROTATE_SEC > 0 && !new URLSearchParams(location.search).has('board')) {
    setTimeout(() => location.reload(), AUTO_ROTATE_SEC * 1000);
}

// ── DateTime ─────────────────────────────────────────────────────────────
BoardClient.onTopic("datetime", (data) => {
    setText("datetime-time", data.time);
    setText("datetime-seconds", data.seconds);
    setText("datetime-date", data.date);
});

// ── Weather current ──────────────────────────────────────────────────────
BoardClient.onTopic("weather_current", (data) => {
    setText("weather-temp", data.temp_c !== undefined ? `${Math.round(data.temp_c)}°` : null);
    setText("weather-desc", data.sky_description || data.sky_title);
    setText("weather-icon", data.icon || "🌤️");
    setText("weather-wind", data.wind_description);
    setText("weather-sunrise", data.sunrise_time);
    setText("weather-sunset", data.sunset_time);
    setText("weather-precip", `${data.precip_probability}%`);
});

// ── Calendar ─────────────────────────────────────────────────────────
BoardClient.onTopic("calendar", (days) => {
    const container = document.getElementById("calendar-container");
    if (!container || !Array.isArray(days)) return;
    BuildCalendarColumns(container, days, false);
});

// ── Background images ─────────────────────────────────────────────────────
BoardClient.onTopic("background_images", (data) => {
    const url = data[BOARD_NAME];
    if (url) {
        document.getElementById("background").style.backgroundImage = `url('${url}')`;
    }
});
</script>
</body>
</html>
