<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ board_name | default("DisplayBoard") }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Board 1: main layout — 3-column grid, iPad landscape */
        .board {
            grid-template-columns: 1fr 3fr 0.5fr;
            grid-template-rows: 1.2fr 1.1fr 1.2fr 0.8fr 1.2fr;
            grid-template-areas:
                "datetime       weather-now      pagination"
                "power          weather-hourly   weather-hourly"
                "power          weather-daily    weather-daily"
                "energy         energy           energy"
                "calendar       calendar         calendar";
        }

        .topic-datetime         { grid-area: datetime; }
        .topic-pagination       { grid-area: pagination; }
        .topic-weather-current  { grid-area: weather-now; }
        .topic-power            { grid-area: power; }
        .topic-energy           { grid-area: energy; }
        .topic-weather-hourly   { grid-area: weather-hourly; }
        .topic-weather-daily    { grid-area: weather-daily; }
        .topic-calendar         { grid-area: calendar; }
    </style>
</head>
<body>

<div id="background"></div>
<div id="ws-status"></div>

<div class="board">

    <!-- ── Date / Time ───────────────────────────────────────────────── -->
    <div class="topic topic-datetime">
        <div class="time-detail">
            <div class="datetime-time" id="datetime-time">--:--</div>
            <div class="datetime-time-seconds" id="datetime-seconds">--</div>
        </div>
        <div class="datetime-date" id="datetime-date">--- -- ----</div>
    </div>

    <!-- ── Current Weather ───────────────────────────────────────────── -->
    <div class="topic topic-weather-current">
        <div class="topic-label">Current Weather</div>
        <div class="weather-content">
            <div class="weather-icon" id="weather-icon">🌤</div>
            <div class="weather-detail">
                <div class="weather-temp" id="weather-temp">--°</div>
                <div class="weather-desc" id="weather-desc">Loading…</div>
                <div class="weather-wind" id="weather-wind">Wind: --</div>
            </div>
            <div class="weather-extra">
                <div class="weather-extra-row">
                    <img src="/static/sunrise.png" class="weather-extra-icon" alt="Sunrise">
                    <span class="weather-extra-value" id="weather-sunrise">--:--</span>
                </div>
                <div class="weather-extra-row">
                    <img src="/static/sunset.png" class="weather-extra-icon" alt="Sunset">
                    <span class="weather-extra-value" id="weather-sunset">--:--</span>
                </div>
                <div class="weather-extra-row">
                    <div class="weather-extra-icon" id="weather-extra-icon">💧</div>
                    <span class="weather-extra-value" id="weather-precip">--%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Board Pagination ───────────────────────────────────────────── -->
    <div class="topic topic-pagination" data-board-count="{{ board_count | default(2) }}">
        <button class="pagination-btn" onclick="prevBoard()">&#8249;</button>
        <!-- <span class="pagination-name" id="board-name">{{ board_name | default("Board 1") }}</span> -->
        <button class="pagination-btn" onclick="nextBoard()">&#8250;</button>
    </div>

    <!-- ── PowerController: Outputs and Probes ─────────────────────────────────── -->
    <div class="topic topic-power">
        <div class="topic-label">Outputs</div>
        <div id="home-outputs"></div>
        <div class="topic-label">&nbsp;</div>
        <div class="topic-label">Temperature Probes</div>
        <div id="home-probes"></div>
    </div>

    <!-- ── Hourly Forecast ────────────────────────────────────────────── -->
    <div class="topic topic-weather-hourly">
        <div class="topic-label">Hourly Forecast</div>
        <div class="weather-detail-row" id="hourly-forecast">
            <!-- Populated by JS -->
            <div class="weather-detail-slot">
                <div class="weather-detail-time">--:--</div>
                <div class="weather-detail-icon">🌤</div>
                <div class="weather-detail-temp">--°</div>
            </div>
        </div>
    </div>

    <!-- ── Daily Forecast ────────────────────────────────────────────── -->
    <div class="topic topic-weather-daily">
        <div class="topic-label">Daily Forecast</div>
        <div class="weather-detail-row" id="daily-forecast">
            <!-- Populated by JS -->
            <div class="weather-detail-slot">
                <div class="weather-detail-day-row">
                    <div class="weather-detail-day">--</div>
                    <div class="weather-detail-icon">🌤</div>
                </div>
                <div class="weather-detail-temp">--°&nbsp;--°</div>
                <div class="weather-detail-precip">💧 --%</div>
            </div>
        </div>
    </div>

    <!-- ── Amber Energy ───────────────────────────────────────────────── -->
    <div class="topic topic-energy">
        <div class="topic-label">Energy</div>
        <div class="energy-container">
            <div class="energy-current">
                <span class="energy-icon" id="energy-icon"> </span>
                <span class="energy-rate" id="energy-rate">--</span>
                <span class="energy-unit">¢/kWh</span>
            </div>
            <div class="energy-forecast" id="energy-forecast">
                <!-- Populated by JS -->
                <div class="forecast-slot">
                    <div class="forecast-row">
                        <span class="forecast-icon"> </span>
                        <span class="forecast-rate">--</span>
                        <span class="forecast-unit">¢</span>
                    </div>
                    <div class="forecast-time">--:--</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Calendar ────────────────────────────────────────────────────── -->
    <div class="topic topic-calendar">
        <div class="calendar-container" id="calendar-container">
            Loading...
        </div>
    </div>    

</div>

<script src="/static/board.js"></script>
<script id="board-config" type="application/json">
{{ {"board_name": board_name, "auto_rotate_sec": auto_rotate_sec} | tojson }}
</script>
<script>
const BOARD_CONFIG = JSON.parse(document.getElementById("board-config").textContent);
const BOARD_NAME = BOARD_CONFIG.board_name;
const AUTO_ROTATE_SEC = BOARD_CONFIG.auto_rotate_sec;

// ── Auto-refresh for board rotation ─────────────────────────────────────────
// Only auto-refresh when no explicit board is selected (enables auto-rotation)
if (AUTO_ROTATE_SEC > 0 && !new URLSearchParams(location.search).has('board')) {
    setTimeout(() => location.reload(), AUTO_ROTATE_SEC * 1000);
}

// ── DateTime ─────────────────────────────────────────────────────────────
BoardClient.onTopic("datetime", (data) => {
    setText("datetime-time", data.time);
    setText("datetime-seconds", data.seconds);
    setText("datetime-date", data.date);
});

// ── PowerController ──────────────────────────────────────────────────────
BoardClient.onTopic("powercontroller", (data) => {
    if (!data.connected) return;

    // Outputs — render all into the home panel
    const container = document.getElementById("home-outputs");
    if (container && Array.isArray(data.outputs)) {
        container.innerHTML = data.outputs.map(o => `
            <div class="home-row">
                <span class="home-label">${o.display_name || o.name}</span>
                <span class="home-value ${o.state ? "status-on" : "status-off"}">${o.state ? "ON" : "OFF"}</span>
            </div>
        `).join("");
    }

    // Probes
    const probeContainer = document.getElementById("home-probes");
    if (probeContainer && Array.isArray(data.probes)) {
        probeContainer.innerHTML = data.probes.map(p => `
            <div class="home-row">
                <span class="home-label">${p.display_name || p.name}</span>
                <span class="home-value">${p.temperature !== null ? p.temperature.toFixed(0) + "°C" : "—"}</span>
            </div>
        `).join("");
    }

});

// ── Weather current ──────────────────────────────────────────────────────
BoardClient.onTopic("weather_current", (data) => {
    setText("weather-temp", data.temp_c !== undefined ? `${Math.round(data.temp_c)}°` : null);
    setText("weather-desc", data.sky_description || data.sky_title);
    setText("weather-icon", data.icon || "🌤️");
    setText("weather-wind", data.wind_description);
    setText("weather-sunrise", data.sunrise_time);
    setText("weather-sunset", data.sunset_time);
    setText("weather-precip", `${data.precip_probability}%`);
});

// ── Weather hourly ───────────────────────────────────────────────────────
BoardClient.onTopic("weather_hourly", (slots) => {
    const container = document.getElementById("hourly-forecast");
    if (!container || !Array.isArray(slots)) return;
    container.innerHTML = slots.slice(0, 9).map(h => `
        <div class="weather-detail-slot">
            <div class="weather-detail-time">${h.time || "--"}</div>
            <div class="weather-detail-icon">${h.icon || "🌤"}</div>
            <div class="weather-detail-temp">${h.temp_c !== undefined ? Math.round(h.temp_c) + "°" : "--"}</div>
        </div>
    `).join("");
});

// ── Weather daily ───────────────────────────────────────────────────────
BoardClient.onTopic("weather_daily", (slots) => {
    const container = document.getElementById("daily-forecast");
    if (!container || !Array.isArray(slots)) return;
    container.innerHTML = slots.slice(0, 7).map(h => `
        <div class="weather-detail-slot">
            <div class="weather-detail-day-row">
                <div class="weather-detail-day">${h.day || "--"}</div>
                <div class="weather-detail-icon">${h.icon || "🌤"}</div>
            </div>
            <div class="weather-detail-temp">
                ${h.temp_high_c !== undefined ? Math.round(h.temp_high_c) + "°" : "--"}&nbsp;${h.temp_low_c !== undefined ? Math.round(h.temp_low_c) + "°" : "--"}
            </div>
            <div class="weather-detail-precip">
                💧 ${h.precip_probability !== undefined ? h.precip_probability + "%" : "--%"}
            </div>
        </div>
    `).join("");
});

// ── Amber Energy ─────────────────────────────────────────────────────────
BoardClient.onTopic("amber_energy", (data) => {
    if (!data.connected) return;

    const price = data.current_price;
    setText("energy-rate", price !== null && price !== undefined ? price.toFixed(0) : null);
    setText("energy-icon", data.current_status_icon || " ");

    const container = document.getElementById("energy-forecast");
    if (container && Array.isArray(data.forecast)) {
        container.innerHTML = data.forecast.slice(0, 9).map(f => `
            <div class="forecast-slot">
                <div class="forecast-row">
                    <span class="forecast-icon">${f.status_icon || " "}</span>
                    <span class="forecast-rate">${f.price !== null && f.price !== undefined ? f.price.toFixed(0) : "--"}</span>
                    <span class="forecast-unit">¢</span>
                </div>
                <div class="forecast-time">${f.time || "--"}</div>
            </div>
        `).join("");
    }
});

// ── Calendar ─────────────────────────────────────────────────────────
BoardClient.onTopic("calendar", (days) => {
    const container = document.getElementById("calendar-container");
    if (!container || !Array.isArray(days)) return;
    BuildCalendarColumns(container, days, true);
});

// ── Background images ─────────────────────────────────────────────────────
BoardClient.onTopic("background_images", (data) => {
    const url = data[BOARD_NAME];
    if (url) {
        document.getElementById("background").style.backgroundImage = `url('${url}')`;
    }
});
</script>
</body>
</html>
