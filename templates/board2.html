<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ global_data.AppLabel | default("DisplayBoard") }}</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Board 2: alternate layout — emphasis on clock and weather, minimal data */
        .board {
            grid-template-columns: 1fr 320px;
            grid-template-rows: 1fr auto auto;
            grid-template-areas:
                "datetime   weather-now"
                "datetime   weather-hourly"
                "pagination pagination";
        }

        .topic-datetime        { grid-area: datetime; display: flex; flex-direction: column; justify-content: center; }
        .topic-weather-current { grid-area: weather-now; }
        .topic-weather-hourly  { grid-area: weather-hourly; }
        .topic-pagination      { grid-area: pagination; }

        /* Larger clock for this layout */
        .datetime-time {
            font-size: 120px;
            font-weight: 100;
            letter-spacing: -4px;
            line-height: 1;
        }

        .datetime-date {
            font-size: 28px;
        }
    </style>
</head>
<body>

<div id="background"></div>
<div id="ws-status"></div>

<div class="board">

    <!-- ── Date / Time (large) ────────────────────────────────────────── -->
    <div class="topic topic-datetime">
        <div class="topic-label">Date &amp; Time</div>
        <div class="datetime-time" id="datetime-time">--:--</div>
        <div class="datetime-date" id="datetime-date">--- -- ----</div>
    </div>

    <!-- ── Current Weather ───────────────────────────────────────────── -->
    <div class="topic topic-weather-current">
        <div class="topic-label">Current Weather</div>
        <div class="weather-icon" id="weather-icon">🌤</div>
        <div class="weather-detail">
            <div class="weather-temp" id="weather-temp">--°</div>
            <div class="weather-desc" id="weather-desc">Loading…</div>
            <div class="weather-wind" id="weather-wind">Wind: --</div>
        </div>
    </div>

    <!-- ── Hourly Forecast ────────────────────────────────────────────── -->
    <div class="topic topic-weather-hourly">
        <div class="topic-label">Next 4 Hours</div>
        <div class="hourly-row" id="hourly-forecast">
            <div class="hourly-slot"><div class="hourly-time">--:--</div><div class="hourly-icon">🌤</div><div class="hourly-temp">--°</div></div>
            <div class="hourly-slot"><div class="hourly-time">--:--</div><div class="hourly-icon">🌤</div><div class="hourly-temp">--°</div></div>
            <div class="hourly-slot"><div class="hourly-time">--:--</div><div class="hourly-icon">🌤</div><div class="hourly-temp">--°</div></div>
            <div class="hourly-slot"><div class="hourly-time">--:--</div><div class="hourly-icon">🌤</div><div class="hourly-temp">--°</div></div>
        </div>
    </div>

    <!-- ── Board Pagination ───────────────────────────────────────────── -->
    <div class="topic topic-pagination" data-board-count="{{ board_count | default(2) }}">
        <button class="pagination-btn" onclick="prevBoard()">&#8249;</button>
        <span class="pagination-name" id="board-name">{{ board_name | default("Board 2") }}</span>
        <button class="pagination-btn" onclick="nextBoard()">&#8250;</button>
    </div>

</div>

<script src="/static/board.js"></script>
<script>
const BOARD_NAME = {{ board_name | tojson }};

BoardClient.onTopic("datetime", (data) => {
    setText("datetime-time", data.time);
    setText("datetime-date", data.date);
});

BoardClient.onTopic("weather_current", (data) => {
    setText("weather-temp", data.temp_c !== undefined ? `${Math.round(data.temp_c)}°` : null);
    setText("weather-desc", data.sky);
    setText("weather-icon", data.icon || "🌤️");
    setText("weather-wind", data.wind_speed_kmh !== undefined
        ? `Wind: ${Math.round(data.wind_speed_kmh)} km/h ${data.wind_dir || ""}`.trim()
        : null);
});

BoardClient.onTopic("weather_hourly", (slots) => {
    const container = document.getElementById("hourly-forecast");
    if (!container || !Array.isArray(slots)) return;
    container.innerHTML = slots.slice(0, 4).map(h => `
        <div class="hourly-slot">
            <div class="hourly-time">${h.time || "--"}</div>
            <div class="hourly-icon">${h.icon || "🌤️"}</div>
            <div class="hourly-temp">${h.temp_c !== undefined ? Math.round(h.temp_c) + "°" : "--"}</div>
        </div>
    `).join("");
});

BoardClient.onTopic("background_images", (data) => {
    const url = data[BOARD_NAME];
    if (url) {
        document.getElementById("background").style.backgroundImage = `url('${url}')`;
    }
});
</script>
</body>
</html>
